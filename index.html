<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7C3AED">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<title>✏️ 따라그리기</title>
<style>
:root{
  --pur:#7C3AED; --pur2:#A855F7; --pur-light:#EDE9FE;
  --pink:#EC4899; --yel:#FBBF24; --mint:#10B981; --sky:#38BDF8;
  --white:#FFFFFF; --soft:#F5F3FF;
  --txt:#1E1B4B; --txt-dim:#6D6BA0;
  --shadow: 0 4px 20px rgba(124,58,237,.25);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{
  width:100%;height:100%;background:#1E1B4B;
  font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
  -webkit-user-select:none;-webkit-touch-callout:none;
  position:fixed;inset:0;
}
#app{position:fixed;inset:0;height:100%;height:100dvh;}

/* ── 카메라 ── */
video#cam{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;background:#000;touch-action:none;
}
video#cam.mirror{transform:scaleX(-1);}

/* ── 이미지 오버레이 ── */
#stage{
  position:absolute;inset:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  touch-action:none;overscroll-behavior:none;
}
#traceImg{
  position:absolute;left:50%;top:50%;
  max-width:none;max-height:none;
  transform-origin:center center;
  pointer-events:none;will-change:transform,opacity;
}

/* ── 별 파티클 (시작화면 장식) ── */
.star{
  position:absolute;pointer-events:none;font-size:22px;
  animation:twinkle 2.5s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.25;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}

/* ── 시작화면 ── */
#empty{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;text-align:center;padding:28px;
  background:linear-gradient(160deg,#1E1B4B 0%,#4C1D95 60%,#2D1B69 100%);
  overflow:hidden;
}
#empty.hidden{display:none;}

.empty-art{
  width:140px;height:140px;position:relative;margin-bottom:20px;
}
.empty-art svg{width:100%;height:100%;}

#empty h1{
  font-size:24px;font-weight:800;color:#fff;
  line-height:1.3;margin-bottom:10px;letter-spacing:-.3px;
}
#empty p{
  font-size:14px;line-height:1.7;color:#C4B5FD;
  max-width:270px;margin-bottom:28px;
}

.start-btn{
  background:linear-gradient(135deg,var(--pink),var(--pur2));
  color:#fff;border:none;border-radius:999px;
  font-size:17px;font-weight:800;
  padding:16px 36px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 6px 24px rgba(236,72,153,.5);
  letter-spacing:-.2px;
}

/* ── 카메라 오류 화면 ── */
#permError{
  position:absolute;inset:0;z-index:30;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:36px;
  background:linear-gradient(160deg,#1E1B4B,#4C1D95);
}
#permError.show{display:flex;}
#permError .err-icon{font-size:56px;}
#permError h2{font-size:20px;font-weight:800;color:#FCA5A5;margin:0;}
#permError p{font-size:13px;line-height:1.7;color:#C4B5FD;max-width:290px;}
#permError code{
  background:rgba(255,255,255,.12);padding:3px 8px;
  border-radius:6px;color:#fff;font-size:12px;
}

/* ── 상단바 ── */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:15;
  padding:max(10px,env(safe-area-inset-top)) 12px 8px;
  display:flex;align-items:center;gap:8px;
}

/* 버튼 공통 */
.btn{
  border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  border-radius:18px;flex:none;transition:transform .12s ease,opacity .12s ease;
}
.btn:active{transform:scale(.9);opacity:.85;}

.btn-sq{
  width:52px;height:52px;border-radius:18px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,.25);
  font-size:22px;color:#fff;
}
.btn-sq.active{
  background:linear-gradient(135deg,var(--pink),var(--pur2));
  border-color:transparent;
  box-shadow:0 4px 14px rgba(236,72,153,.45);
}
.btn-sq svg{width:26px;height:26px;}

/* 투명도 슬라이더 래퍼 */
#sliderWrap{
  flex:1;display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,.25);
  border-radius:18px;padding:6px 12px;height:52px;
}
#sliderWrap .sl-icon{font-size:18px;flex:none;}
input[type=range]{
  flex:1;-webkit-appearance:none;height:5px;border-radius:5px;
  background:rgba(255,255,255,.3);outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--yel),var(--pink));
  border:2.5px solid #fff;box-shadow:var(--shadow-sm);
}

/* ── 하단바 ── */
#bottombar{
  position:absolute;left:0;right:0;bottom:0;z-index:15;
  padding:12px 14px max(14px,env(safe-area-inset-bottom));
  display:flex;align-items:flex-end;justify-content:space-between;
}

.btn-round{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.15);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,.25);
  font-size:22px;color:#fff;
}
.btn-round svg{width:26px;height:26px;}
.btn-round.active{
  background:linear-gradient(135deg,var(--mint),var(--sky));
  border-color:transparent;
  box-shadow:0 4px 14px rgba(16,185,129,.45);
}

.col-btn{display:flex;flex-direction:column;align-items:center;gap:5px;}
.col-btn span{font-size:11px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:-.2px;}

/* 가운데 큰 버튼 */
#pickBtn{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pur2));
  border:3.5px solid rgba(255,255,255,.5);
  box-shadow:0 6px 24px rgba(236,72,153,.55);
  font-size:28px;display:flex;align-items:center;justify-content:center;
  transition:transform .12s ease;
}
#pickBtn:active{transform:scale(.9);}
#fileInput{display:none;}

/* ── 토스트 ── */
.toast{
  position:absolute;bottom:130px;left:50%;transform:translateX(-50%);
  background:rgba(30,27,75,.92);border:1.5px solid rgba(255,255,255,.2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;
  color:#fff;z-index:40;opacity:0;pointer-events:none;
  transition:opacity .2s ease;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ── 잠금 오버레이 안내 ── */
#lockHint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:8;pointer-events:none;
  background:rgba(124,58,237,.35);backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  border:2px dashed rgba(255,255,255,.35);border-radius:16px;
  padding:8px 18px;font-size:13px;font-weight:800;color:#fff;
  opacity:0;transition:opacity .3s;
}
#lockHint.show{opacity:1;}
</style>
</head>
<body>
<div id="app">

  <video id="cam" autoplay playsinline muted></video>

  <div id="stage">
    <img id="traceImg" alt="" draggable="false">
  </div>

  <!-- 시작 화면 -->
  <div id="empty">
    <!-- 별 장식 -->
    <div class="star" style="top:8%;left:8%;animation-delay:0s">⭐</div>
    <div class="star" style="top:12%;right:10%;animation-delay:.6s">✨</div>
    <div class="star" style="top:30%;left:5%;animation-delay:1.1s;font-size:16px">🌟</div>
    <div class="star" style="bottom:22%;right:7%;animation-delay:.3s">⭐</div>
    <div class="star" style="bottom:14%;left:12%;animation-delay:.9s;font-size:16px">✨</div>

    <div class="empty-art">
      <svg viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 배경 원 -->
        <circle cx="70" cy="70" r="64" fill="#4C1D95" opacity=".7"/>
        <!-- 종이 -->
        <rect x="34" y="32" width="60" height="76" rx="8" fill="white" opacity=".95"/>
        <rect x="34" y="32" width="60" height="76" rx="8" stroke="#A78BFA" stroke-width="2"/>
        <!-- 줄 -->
        <line x1="44" y1="52" x2="84" y2="52" stroke="#DDD6FE" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44" y1="63" x2="84" y2="63" stroke="#DDD6FE" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44" y1="74" x2="70" y2="74" stroke="#DDD6FE" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 별 그림 -->
        <polygon points="64,39 66.2,45.6 73.2,45.6 67.6,49.6 69.8,56.2 64,52.2 58.2,56.2 60.4,49.6 54.8,45.6 61.8,45.6" fill="#FBBF24"/>
        <!-- 연필 -->
        <g transform="rotate(-35,100,95)">
          <rect x="88" y="72" width="12" height="40" rx="3" fill="#FBBF24"/>
          <rect x="88" y="72" width="12" height="8" rx="3" fill="#F87171"/>
          <polygon points="88,112 100,112 94,124" fill="#FDE68A"/>
          <polygon points="91,118 97,118 94,124" fill="#1E1B4B" opacity=".6"/>
        </g>
        <!-- 카메라 아이콘 -->
        <circle cx="70" cy="96" r="12" fill="#7C3AED" opacity=".9"/>
        <circle cx="70" cy="96" r="7" fill="none" stroke="white" stroke-width="2.2"/>
        <circle cx="70" cy="96" r="3" fill="white"/>
        <rect x="74" y="89" width="4" height="3" rx="1" fill="white"/>
      </svg>
    </div>

    <h1>사진을 고르면<br>따라 그릴 수 있어요! 🎨</h1>
    <p>카메라로 종이를 비추면서<br>화면에 보이는 그림을 따라 그려보세요.</p>
    <button class="start-btn btn" id="pickBtnEmpty">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      그림 사진 고르기
    </button>
  </div>

  <!-- 카메라 오류 -->
  <div id="permError">
    <div class="err-icon">😢</div>
    <h2>카메라를 열 수 없어요</h2>
    <p>
      이 앱은 <code>https://</code> 주소에서만 카메라가 켜져요.<br><br>
      선생님께 GitHub Pages 주소를 부탁하거나,<br>
      안드로이드 APK 앱으로 설치해서 사용해요!
    </p>
  </div>

  <input type="file" id="fileInput" accept="image/*">

  <!-- 상단바 -->
  <div id="topbar">
    <!-- 좌우반전 -->
    <button class="btn btn-sq" id="flipBtn" title="좌우 반전">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/>
        <path d="M12 20v2"/><path d="M12 14v2"/><path d="M12 8v2"/><path d="M12 2v2"/>
      </svg>
    </button>
    <!-- 투명도 슬라이더 -->
    <div id="sliderWrap">
      <span class="sl-icon">👁️</span>
      <input type="range" id="opacitySlider" min="10" max="95" value="55">
    </div>
    <!-- 잠금 -->
    <button class="btn btn-sq" id="lockBtn" title="위치 고정">
      <svg id="lockIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </button>
  </div>

  <!-- 하단바 -->
  <div id="bottombar">
    <!-- 카메라 전환 -->
    <div class="col-btn">
      <button class="btn btn-round" id="switchCamBtn" title="카메라 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <span>카메라</span>
    </div>

    <!-- 손전등 -->
    <div class="col-btn">
      <button class="btn btn-round" id="torchBtn" title="손전등">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6c0-2.2-1.8-4-4-4H10C7.8 2 6 3.8 6 6l2 8h8l2-8z"/>
          <path d="M8 14v2a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2"/>
          <line x1="12" y1="18" x2="12" y2="21"/>
          <line x1="9" y1="21" x2="15" y2="21"/>
        </svg>
      </button>
      <span>손전등</span>
    </div>

    <!-- 가운데: 사진 고르기 -->
    <div class="col-btn">
      <button class="btn" id="pickBtn" title="사진 고르기">🖼️</button>
      <span>사진 바꾸기</span>
    </div>

    <!-- 초기화 -->
    <div class="col-btn">
      <button class="btn btn-round" id="resetBtn" title="위치 초기화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <span>초기화</span>
    </div>

    <!-- 빈 자리 맞춤 -->
    <div style="width:52px"></div>
  </div>

  <div id="lockHint">🔒 위치 잠금 중</div>
  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
  document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
  document.addEventListener('gesturestart',function(e){e.preventDefault();});

  const camEl     = document.getElementById('cam');
  const stage     = document.getElementById('stage');
  const img       = document.getElementById('traceImg');
  const emptyEl   = document.getElementById('empty');
  const permErrorEl = document.getElementById('permError');
  const fileInput = document.getElementById('fileInput');
  const toastEl   = document.getElementById('toast');
  const lockHint  = document.getElementById('lockHint');

  const opacitySlider = document.getElementById('opacitySlider');
  const flipBtn       = document.getElementById('flipBtn');
  const lockBtn       = document.getElementById('lockBtn');
  const torchBtn      = document.getElementById('torchBtn');
  const switchCamBtn  = document.getElementById('switchCamBtn');
  const resetBtn      = document.getElementById('resetBtn');
  const pickBtn       = document.getElementById('pickBtn');
  const pickBtnEmpty  = document.getElementById('pickBtnEmpty');

  let state = {x:0,y:0,scale:1,rotation:0,flipped:false,locked:false,opacity:.55};
  let currentFacing = 'environment';
  let currentStream = null;
  let currentTrack  = null;
  let torchOn  = false;
  let hasImage = false;

  /* ── 토스트 ── */
  function showToast(msg,emoji){
    toastEl.textContent = (emoji?emoji+' ':'')+msg;
    toastEl.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toastEl.classList.remove('show'),1700);
  }

  /* ── 변환 적용 ── */
  function applyTransform(){
    const fs = state.flipped ? -1 : 1;
    img.style.transform =
      `translate(-50%,-50%) translate(${state.x}px,${state.y}px) rotate(${state.rotation}deg) scale(${fs*state.scale},${state.scale})`;
    img.style.opacity = state.opacity;
  }

  /* ── 카메라 시작 ── */
  async function startCamera(facing){
    try{
      if(currentStream) currentStream.getTracks().forEach(t=>t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:false,
        video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}}
      });
      currentStream = stream;
      currentTrack  = stream.getVideoTracks()[0];
      camEl.srcObject = stream;
      camEl.classList.toggle('mirror', facing==='user');
      permErrorEl.classList.remove('show');
      torchOn = false;
      torchBtn.classList.remove('active');
      const caps = currentTrack.getCapabilities ? currentTrack.getCapabilities() : {};
      torchBtn.style.opacity = caps.torch ? '1' : '0.45';
    }catch(err){
      permErrorEl.classList.add('show');
    }
  }

  function isSecure(){
    return location.protocol==='https:' ||
           location.hostname==='localhost' ||
           location.hostname==='127.0.0.1';
  }
  if(!isSecure()||!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    permErrorEl.classList.add('show');
  } else {
    startCamera(currentFacing);
  }

  /* ── 카메라 전환 ── */
  switchCamBtn.addEventListener('click',()=>{
    currentFacing = currentFacing==='environment' ? 'user' : 'environment';
    startCamera(currentFacing);
    showToast(currentFacing==='environment'?'뒷 카메라로 바꿨어요':'앞 카메라로 바꿨어요','📷');
  });

  /* ── 손전등 ── */
  torchBtn.addEventListener('click',async()=>{
    if(!currentTrack) return;
    const caps = currentTrack.getCapabilities ? currentTrack.getCapabilities() : {};
    if(!caps.torch){ showToast('이 폰은 손전등을 지원하지 않아요','💡'); return; }
    try{
      torchOn = !torchOn;
      await currentTrack.applyConstraints({advanced:[{torch:torchOn}]});
      torchBtn.classList.toggle('active',torchOn);
      showToast(torchOn?'손전등 켰어요!':'손전등 껐어요','💡');
    }catch(e){ showToast('손전등을 켤 수 없어요','😅'); }
  });

  /* ── 사진 불러오기 ── */
  function handleFile(file){
    if(!file) return;
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      hasImage = true;
      emptyEl.classList.add('hidden');
      const targetW = window.innerWidth * 0.88;
      img.style.width  = img.naturalWidth  + 'px';
      img.style.height = img.naturalHeight + 'px';
      state.scale = targetW / img.naturalWidth;
      state.x=0; state.y=0; state.rotation=0;
      applyTransform();
      showToast('사진을 불러왔어요! 이제 따라 그려봐요','🎨');
    };
    img.src = url;
  }
  fileInput.addEventListener('change',e=>{ handleFile(e.target.files[0]); fileInput.value=''; });
  pickBtn.addEventListener('click',()=>fileInput.click());
  pickBtnEmpty.addEventListener('click',()=>fileInput.click());

  /* ── 투명도 ── */
  opacitySlider.addEventListener('input',()=>{
    state.opacity = opacitySlider.value / 100;
    applyTransform();
  });

  /* ── 좌우반전 ── */
  flipBtn.addEventListener('click',()=>{
    state.flipped = !state.flipped;
    flipBtn.classList.toggle('active',state.flipped);
    showToast(state.flipped?'사진을 뒤집었어요':'원래대로 돌아왔어요','🔄');
    applyTransform();
  });

  /* ── 잠금 ── */
  lockBtn.addEventListener('click',()=>{
    state.locked = !state.locked;
    lockBtn.classList.toggle('active',state.locked);
    lockHint.classList.toggle('show',state.locked);
    // 아이콘 교체
    document.getElementById('lockIcon').innerHTML = state.locked
      ? '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>'
      : '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
    showToast(state.locked?'위치를 고정했어요! 이제 마음껏 그려요':'위치 고정을 풀었어요','🔒');
  });

  /* ── 초기화 ── */
  resetBtn.addEventListener('click',()=>{
    if(!hasImage) return;
    const targetW = window.innerWidth * 0.88;
    state.scale = targetW / img.naturalWidth;
    state.x=0; state.y=0; state.rotation=0;
    applyTransform();
    showToast('처음 위치로 돌아왔어요','↺');
  });

  /* ── 터치 제스처 ── */
  const pointers = new Map();
  let gestureStart = null;
  function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
  function angle(a,b){return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;}
  function mid(a,b){return{x:(a.x+b.x)/2,y:(a.y+b.y)/2};}

  stage.addEventListener('pointerdown',e=>{
    if(state.locked||!hasImage) return;
    stage.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pointers.size===1){
      gestureStart={mode:'drag',startX:state.x,startY:state.y,p0:{...[...pointers.values()][0]}};
    } else if(pointers.size===2){
      const [p1,p2]=[...pointers.values()];
      gestureStart={mode:'pinch',startScale:state.scale,startRot:state.rotation,
        startX:state.x,startY:state.y,d0:dist(p1,p2),a0:angle(p1,p2),m0:mid(p1,p2)};
    }
  });
  stage.addEventListener('pointermove',e=>{
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(gestureStart&&gestureStart.mode==='drag'&&pointers.size===1){
      const p=[...pointers.values()][0];
      state.x=gestureStart.startX+(p.x-gestureStart.p0.x);
      state.y=gestureStart.startY+(p.y-gestureStart.p0.y);
      applyTransform();
    } else if(gestureStart&&gestureStart.mode==='pinch'&&pointers.size===2){
      const [p1,p2]=[...pointers.values()];
      state.scale=Math.max(.1,gestureStart.startScale*(dist(p1,p2)/gestureStart.d0));
      state.rotation=gestureStart.startRot+(angle(p1,p2)-gestureStart.a0);
      const m1=mid(p1,p2);
      state.x=gestureStart.startX+(m1.x-gestureStart.m0.x);
      state.y=gestureStart.startY+(m1.y-gestureStart.m0.y);
      applyTransform();
    }
  });
  function endPointer(e){
    pointers.delete(e.pointerId);
    if(pointers.size===1){
      const p=[...pointers.values()][0];
      gestureStart={mode:'drag',startX:state.x,startY:state.y,p0:{...p}};
    } else if(pointers.size===0){ gestureStart=null; }
  }
  stage.addEventListener('pointerup',endPointer);
  stage.addEventListener('pointercancel',endPointer);

  // 서비스워커 등록
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
})();
</script>
